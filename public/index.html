<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E10600">
<meta name="description" content="F1-dashboard met live standen, verifieerbare uitslagen en AI-raceverslagen.">
<title>F1 2026 Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-sub">Seizoen 2026</div>
    <div class="header-title">🏎️ F1 Dashboard</div>
    <div class="header-desc">Jouw complete gids voor Formule 1 — feiten en verslagen apart ververst</div>
    <div class="refresh-toolbar">
      <div class="refresh-cluster">
        <button id="refreshFactsBtn">🔄 Refresh standen &amp; uitslagen</button>
        <div id="factsStatus" class="refresh-status">Nog niet geverifieerd</div>
      </div>
      <div class="refresh-cluster">
        <button id="refreshReportsBtn">📝 Refresh verslagen</button>
        <div id="reportsStatus" class="refresh-status">Nog geen verslag-update</div>
      </div>
    </div>
  </div>
</div>
<nav id="nav"></nav>
<div class="map-tip" id="maptip"></div>
<main class="content" id="content"></main>
<noscript>Voor dit dashboard is JavaScript nodig.</noscript>
<script type="module" src="/app.js"></script>
</body>
</html>
